services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: ./backend/.env
    volumes:
      - ./backend/serviceAccountKey.json:/app/serviceAccountKey.json:ro
  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [backend]
  qdrant:
    image: qdrant/qdrant
    ports: ["6333:6333"]
    volumes: ["qdrant_storage:/qdrant/storage"]

volumes:
  qdrant_storage: